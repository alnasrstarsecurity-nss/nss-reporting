
<!DOCTYPE html>
<html lang="en">
  
<head>
   <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
   <meta http-equiv="Expires" content="0" />


  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSS-OPS Patrolling</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js"></script>
</head>
<body>
<script>
/* 🔒 Block direct access without login */
(function () {
  if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}
})();

 document.addEventListener("DOMContentLoaded", function () {

  const role = sessionStorage.getItem("ROLE");

  document.querySelectorAll("button").forEach(btn => {

    const roles = btn.dataset.role;

    if (roles && roles !== "all" && !roles.includes(role)) {
      btn.style.display = "none";
    }

  });

});
</script> 

  
  

  <div class="form-container">
    <img src="Logo.png" alt="Company Logo" class="logo">
    <h2 style="text-align:center;">Main Menu</h2>

    <button data-role="Supervisor,Manager,Admin" onclick="location.href='Patrolling.html'">Submit Patrolling</button>

    <button data-role="Supervisor,Manager,Admin" onclick="location.href='Deviation.html'">Schedule Deviation</button>

    <button data-role="Controller,Manager,Admin" onclick="location.href='Violation.html'">Offence Report</button>
    <button data-role="Controller,Manager,Admin" onclick="location.href='Opscomment.html'">Offence OPS Comment</button>
    <button data-role="Controller,Manager,Admin" onclick="location.href='SubmitOffence.html'">Offence Reporting</button> <br> <br> <br>
    
   

    <div class="spacer"></div>

    <button class="logout-btn" onclick="logout()">Logout</button>

    
  </div>
  

</body>
</html>
