
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manpower Update Report</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/inventory.css">

</head>
<body>

<script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}

  const role = sessionStorage.getItem("ROLE");
if (!["Controller","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
}
</script>


  <!-- FORM -->
  <form id="productForm">

<div class="form-container">

  <div class="form-header">
    <h1>Product Master</h1>
  </div>

           <label>Item Code</label>
<input type="text" id="itemCode" required>

<label>Item Name</label>
<input type="text" id="itemName" required>

<label>Category</label>
<select id="category">
  <option>Uniform</option>
  <option>PPE</option>
  <option>Safety Wear</option>
</select>

<label>Size</label>
<select id="size">
  <option>S</option>
  <option>M</option>
  <option>L</option>
  <option>XL</option>
  <option>XXL</option>
</select>

       

  <label>Unit</label>
<select id="unit">
  <option>PCS</option>
  <option>Pair</option>
</select>

<label>Minimum Stock</label>
<input type="number" id="minStock" value="10">

<label>Status</label>
<select id="status">
  <option>Active</option>
  <option>Inactive</option>
</select>

  <div class="top-row">

  <div class="left-section">
    <label>Item Code</label>

    <div class="search-row">
      <input type="text" id="itemCode" required>
      <button type="button" class="search" onclick="searchProduct()">Search</button>
    </div>
  </div>

  <div class="right-section">
    <label>Product Image</label>
    <input type="file" id="productImage" accept="image/*">
  </div>

</div>

   <button type="submit">Save Product</button>

       
    <p id="msg"></p>

  </form>

  <button type="button" onclick="goBack()">Back</button>
  
</div>
<script>
function goBack() {
  window.location.replace("Inventory/InventoryMenu.html");
}
</script>
<script src="product.js"></script>


</body>
</html>
