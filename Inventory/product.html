
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      background: #356bc1;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Product Master</h2>

<form id="productForm">

<label>Item Code</label>
<input type="text" id="itemCode" required>

<label>Item Name</label>
<input type="text" id="itemName" required>

<label>Category</label>
<select id="category">
  <option>Uniform</option>
  <option>PPE</option>
  <option>Safety Wear</option>
</select>

<label>Size</label>
<select id="size">
  <option>S</option>
  <option>M</option>
  <option>L</option>
  <option>XL</option>
  <option>XXL</option>
</select>

<label>Unit</label>
<select id="unit">
  <option>PCS</option>
  <option>Pair</option>
</select>

<label>Minimum Stock</label>
<input type="number" id="minStock" value="10">

<label>Status</label>
<select id="status">
  <option>Active</option>
  <option>Inactive</option>
</select>

<button type="submit">Save Product</button>

</form>

<p id="msg"></p>

</div>

<script>

document.getElementById("productForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    itemCode: document.getElementById("itemCode").value,
    itemName: document.getElementById("itemName").value,
    category: document.getElementById("category").value,
    size: document.getElementById("size").value,
    unit: document.getElementById("unit").value,
    minStock: document.getElementById("minStock").value,
    status: document.getElementById("status").value
  };

  google.script.run.withSuccessHandler(function(res){
    document.getElementById("msg").innerText = "Saved Successfully!";
    document.getElementById("productForm").reset();
  }).addProduct(data);

});

</script>

</body>
</html>
