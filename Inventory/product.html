
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manpower Update Report</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/inventory.css">

</head>
<body>

<script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}

  const role = sessionStorage.getItem("ROLE");
if (!["Controller","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
}
</script>


  <!-- FORM -->
  <form id="productForm">

<div class="form-container">

  <div class="form-header">
    <h1>Product Master</h1>
  </div>

  <hr>

    <div class="details-grid">

      <div class="section left">

               <form id="productForm">

           <label>Item Code</label>
<input type="text" id="itemCode" required>

<label>Item Name</label>
<input type="text" id="itemName" required>

<label>Category</label>
<select id="category">
  <option>Uniform</option>
  <option>PPE</option>
  <option>Safety Wear</option>
</select>

<label>Size</label>
<select id="size">
  <option>S</option>
  <option>M</option>
  <option>L</option>
  <option>XL</option>
  <option>XXL</option>
</select>

        <button type="submit">Save Product</button>

      </div>



      <!-- RIGHT SIDE -->
<div class="section right">

  <h3>Advanced Search</h3>

  <label>Unit</label>
<select id="unit">
  <option>PCS</option>
  <option>Pair</option>
</select>

<label>Minimum Stock</label>
<input type="number" id="minStock" value="10">

<label>Status</label>
<select id="status">
  <option>Active</option>
  <option>Inactive</option>
</select>

</div>
      
    </div>
    <p id="msg"></p>

    <div id="reportContainer"></div>

  </form>

  <button type="button" onclick="goBack()">Back</button>

</div>
<script>
function goBack() {
  window.location.replace("Inventory/InventoryMenu.html");
}
</script>

    <script>

document.getElementById("productForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    itemCode: document.getElementById("itemCode").value,
    itemName: document.getElementById("itemName").value,
    category: document.getElementById("category").value,
    size: document.getElementById("size").value,
    unit: document.getElementById("unit").value,
    minStock: document.getElementById("minStock").value,
    status: document.getElementById("status").value
  };

  google.script.run.withSuccessHandler(function(res){
    document.getElementById("msg").innerText = "Saved Successfully!";
    document.getElementById("productForm").reset();
  }).addProduct(data);

});

</script>


</body>
</html>
