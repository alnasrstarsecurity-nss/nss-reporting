
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manpower Update Report</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/manpowerreport.css">

</head>
<body>

<script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}

  const role = sessionStorage.getItem("ROLE");
if (!["Controller","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
}
</script>


  <!-- FORM -->
  <form id="manpowerreport">

    <!-- =============================
         
         ============================= -->
<div class="form-container">

  <div class="form-header">
    <h1>Manpower Update Report</h1>
  </div>

  <hr>

  <form id="manpowerreport">

    <div class="details-grid">

      <div class="section employee-left">

        <h3>Search Manpower Report</h3>

        <label>Select Date</label>

        <div class="emp-search-wrapper">
          <input type="date" id="searchDate">

          <button type="button" id="searchBtn" class="search" disabled>
            🔍 Search
          </button>
        </div>

        <div id="status"></div>

      </div>



      <!-- RIGHT SIDE -->
<div class="section employee-right">

  <h3>Advanced Search</h3>

  <label>From Date</label>
  <input type="date" id="fromDate">

  <label>To Date</label>
  <input type="date" id="toDate">

  <label>Accomodation</label>
  <select id="accFilter">
    <option value="">-- All --</option>
    <option value="ABU NAKLAH HIA CAMP">ABU NAKLAH HIA CAMP</option>
  <option value="ABU NAKLAH-CAMP 1">ABU NAKLAH-CAMP 1</option>
    <option value="ABU NAKLAH -CAMP2">ABU NAKLAH-CAMP2</option>
    <option value="UM SALAL CAMP-1">UM SALAL CAMP-1</option>
    <option value="UM SALAL CAMP-2">UM SALAL CAMP-2</option>
    <option value="ASIAN CITY B-21">ASIAN CITY B-21</option>
    <option value="AL THUMAMA NEW (FEMALE)">AL THUMAMA NEW (FEMALE)</option>
    <option value="AL THUMAMA (FEMALE)">AL THUMAMA (FEMALE)</option>
    <option value="BARWA AL BARAHA ">BARWA AL BARAHA </option>
    <option value="AL WAAB (FEMALE)ASPIRE">AL WAAB (FEMALE)ASPIRE</option>
    <option value="BIN OMRAN (FEMALE)BALADIYA">BIN OMRAN (FEMALE)BALADIYA</option>
    <option value="ARGENTINE NEIGHBORHOOD-G3">ARGENTINE NEIGHBORHOOD-G3</option>
    <option value="ARGENTINE NEIGHBORHOOD-C6">ARGENTINE NEIGHBORHOOD-C6</option>
    <option value="ARGENTINE NEIGHBORHOOD-T5">ARGENTINE NEIGHBORHOOD-T5</option>
  </select>

  <button type="button" id="advSearchBtn" class="search">
    🔍 Search
  </button>
  <div id="advStatus" style="margin-top:6px;font-size:13px;"></div>
</div>




      
    </div>

    

    <div id="reportContainer"></div>

  </form>

  <button type="button" onclick="goBack()">⬅ Back to Menu</button>

</div>
<script>
function goBack() {
  window.location.replace("menu.html");
}
</script>

<!-- YOUR EXISTING JS -->
<script src="js/manpowerreport.js" defer></script>

</body>
</html>
