

<!DOCTYPE html>
<html lang="en">
  
<head>

<body>
  <script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}
   const role = sessionStorage.getItem("ROLE");
if (!["Supervisor","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
   }
</script>



<div class="form-container">
<div class="form-header">
  <h1>OPS Comment</h1>
 </div>
  
  <hr>

<form id="opscomment">

<!-- REPORTER -->
  
<div class="section">

  <label>Offence Number</label>

    type="button"
    id="searchOffBtn"
    class="search"
    onclick="fetchOffence()"
    disabled>
    🔍 Search
  </button>
</div>
<div id="empStatus" style="margin-top:6px;font-size:13px;"></div>


  <label>Ops Comment</label>
  <input type="text" id="LocationRemark" name="LocationRemark" data-maxchars="200">

  

<button type="submit" id="submitBtn" disabled>Submit</button>
<div id="status"></div>



</form>
<button type="button" onclick="goBack()">
  ⬅ Back to Menu
</button>

<script>

  window.history.back();
}
</script>
