


<!DOCTYPE html>
<html lang="en">
  
<head>


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manpower Update</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/manpower.css">

  
</head>

<body>
  <script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}
   const role = sessionStorage.getItem("ROLE");
if (!["Supervisor","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
   }
</script>



<div class="form-container">
<div class="form-header">
  <h1>Daily Accomodation Manpower Status</h1>
 </div>
  
  <hr>

<form id="manpower">

  
<div class="section">
  <h3>Accomodation Details </h3>
  

      <label>Accomodation</label>
  <select id="accomodation" name="accomodation">
  <option value="">-- Select --</option>  
  <option value="ABU NAKLAH HIA CAMP">ABU NAKLAH HIA CAMP</option>
  <option value="ABU NAKLAH-CAMP 1">ABU NAKLAH-CAMP 1</option>
    <option value="ABU NAKLAH -CAMP2">ABU NAKLAH-CAMP2</option>
    <option value="UM SALAL CAMP-1">UM SALAL CAMP-1</option>
    <option value="UM SALAL CAMP-2">UM SALAL CAMP-2</option>
    <option value="ASIAN CITY B-21">ASIAN CITY B-21</option>
    <option value="AL THUMAMA NEW (FEMALE)">AL THUMAMA NEW (FEMALE)</option>
    <option value="AL THUMAMA (FEMALE)">AL THUMAMA (FEMALE)</option>
    <option value="BARWA AL BARAHA ">BARWA AL BARAHA </option>
    <option value="AL WAAB (FEMALE)ASPIRE">AL WAAB (FEMALE)ASPIRE</option>
    <option value="BIN OMRAN (FEMALE)BALADIYA">BIN OMRAN (FEMALE)BALADIYA</option>
    <option value="ARGENTINE NEIGHBORHOOD-G3">ARGENTINE NEIGHBORHOOD-G3</option>
    <option value="ARGENTINE NEIGHBORHOOD-C6">ARGENTINE NEIGHBORHOOD-C6</option>
    <option value="ARGENTINE NEIGHBORHOOD-T5">ARGENTINE NEIGHBORHOOD-T5</option>
  
  </select>
  </div>
    


   <div class="section">
     <h3>Man Power Count Project Wise</h3>
<label>Project</label>

<div id="projectContainer">

<div class="projectRow">

<select class="projectType" name="projectType[]" onchange="toggleAddButton(this)" required>
       
  <option value="">-- Select --</option>   
  <option value="Baladiya">Baladiya</option>
  <option value="Civil Aviation">Civil Aviation</option>
    <option value="Q-Mall">Q-Mall</option>
    <option value="QMA">QMA</option>
    <option value="VIP Tower">VIP Tower</option>
    <option value="Katara">Katara</option>
    <option value="Cyber Security">Cyber Security</option>
    <option value="HBK PORR">HBK PORR</option>
    <option value="Aspire">Aspire</option>
    <option value="MOF">MOF</option>
    <option value="Lusail Midmac">Lusail Midmac</option>
    <option value="CCC">CCC</option>
    <option value="Qatar Rail">Qatar Rail</option>
    </select>


    <input type="number"
       class="projectCount"
       placeholder="Count"
       data-maxdigits="4"
       min="0"
       required>

         <button type="button" class="addBtn" onclick="addProject(this)" style="display:none">+</button>
         <button type="button" class="removeBtn" onclick="removeProject(this)" style="display:none">-</button>
         </div>
         </div>


   <label>New Joiners Count</label>
  <input type="number" id="joinerscount" name="joinerscount" data-maxdigits="4" required>
     
     <label>New Joiners Details (Employee Number and Name)</label>
 <textarea id="joinersdetails" name="joinersdetails" data-maxchars="200" required></textarea>

     <label>Standby count</label>
  <input type="number" id="standbycount" name="standbycount" data-maxdigits="4" required>
     
     <label>Standby Details (Employee Number and Name)</label>
 <textarea id="standbydetails" name="standbydetails" data-maxchars="200" required></textarea>


       <label>Total Manpower</label>
  <input type="number" id="totalcount" name="totalcount" data-maxdigits="4" readonly>

   </div>

    
  
  <div class="section">
     <h3>Reporter Details</h3>

      <label>Reporter Name</label>
  <input type="text" id="supervisorName" name="supervisorName" data-maxchars="100" readonly>

   <label>Employee Number</label>
  <input type="number" id="supEmpNumber" name="supEmpNumber" data-maxdigits="5" readonly>

     <label>Designation</label>
  <input type="text" id="supdesignation" name="supdesignation" readonly>

 
   </div>

 <!-- SIGNATURE -->

  <label>Signature</label>
  <canvas id="supSignPad" name="supSignPad"></canvas>
  
<button type="button" class="secondary" onclick="clearSupSignature()">Clear Signature</button>
   

<button type="submit" id="submitBtn" disabled>Submit</button>
<div id="status"></div>



</form>
<button type="button" onclick="goBack()">
  ⬅ Back to Menu
</button>

<script>
function goBack() {
  window.history.back();
}
</script>


<script src="js/manpowerupdate.js"></script>
</body>
</html>
