


<!DOCTYPE html>
<html lang="en">
  
<head>


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manpower Update</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  
</head>

<body>
  <script>
/* 🔒 Block direct access without login */
if (sessionStorage.getItem("LOGGED_IN") !== "YES") {
  window.location.replace("index.html");
}
   const role = sessionStorage.getItem("ROLE");
if (!["Supervisor","Manager","Admin"].includes(role)) {
  window.location.replace("menu.html");
   }
</script>



<div class="form-container">
<div class="form-header">
  <h1>Daily Accomodation Manpower Status</h1>
 </div>
  
  <hr>

<form id="manpower">

  
<div class="section">
  <h3>Accomodation Details </h3>
  

      <label>Accomodation</label>
  <select id="accomodation" name="accomodation">
  <option value="">-- Select --</option>  
  <option value="ABU NAKLAH HIA CAMP">ABU NAKLAH HIA CAMP</option>
  <option value="ABU NAKLAH-CAMP 1">ABU NAKLAH-CAMP 1</option>
    <option value="ABU NAKLAH -CAMP2">ABU NAKLAH-CAMP2</option>
    <option value="UM SALAL CAMP-1">UM SALAL CAMP-1</option>
    <option value="UM SALAL CAMP-2">UM SALAL CAMP-2</option>
    <option value="ASIAN CITY B-21">ASIAN CITY B-21</option>
    <option value="AL THUMAMA NEW (FEMALE)">AL THUMAMA NEW (FEMALE)</option>
    <option value="AL THUMAMA (FEMALE)">AL THUMAMA (FEMALE)</option>
    <option value="BARWA AL BARAHA ">BARWA AL BARAHA </option>
    <option value="AL WAAB (FEMALE)ASPIRE">AL WAAB (FEMALE)ASPIRE</option>
    <option value="BIN OMRAN (FEMALE)BALADIYA">BIN OMRAN (FEMALE)BALADIYA</option>
    <option value="ARGENTINE NEIGHBORHOOD-G3">ARGENTINE NEIGHBORHOOD-G3</option>
    <option value="ARGENTINE NEIGHBORHOOD-C6">ARGENTINE NEIGHBORHOOD-C6</option>
    <option value="ARGENTINE NEIGHBORHOOD-T5">ARGENTINE NEIGHBORHOOD-T5</option>
  
  </select>
  </div>
    


   <div class="section">
     <h3>Man Power Project Wise</h3>
<label>Project</label>

<div id="offenceContainer">

<div class="offenceRow">

<select class="OffenceType" name="OffenceType[]" onchange="toggleAddButton(this)" required>
       
  <option value="">-- Select --</option>   
  <option value="Baladiya">Baladiya</option>
  <option value="Civil Aviation">Civil Aviation</option>
    <option value="Q-Mall">Q-Mall</option>
    <option value="QMA">QMA</option>
    <option value="VIP Tower">VIP Tower</option>
    <option value="Katara">Katara</option>
    <option value="Cyber Security">Cyber Security</option>
    <option value="HBK PORR">HBK PORR</option>
    <option value="Aspire">Aspire</option>
    <option value="MOF">MOF</option>
    <option value="Lusail Midmac">Lusail Midmac</option>
    <option value="CCC">CCC</option>
    <option value="Qatar Rail">Qatar Rail</option>
 
  </select>

         <button type="button" class="addBtn" onclick="addOffence(this)" style="display:none">+</button>
         <button type="button" class="removeBtn" onclick="removeOffence(this)" style="display:none">-</button>
         </div>
         </div>

         
 <textarea id="OtherOffence" name="OtherOffence" placeholder="Describe Offence" style="display:none;" data-maxchars="200"></textarea>

         
     <label>Immediate Supervisor's Comments</label>
 <textarea id="Comments" name="Comments" data-maxchars="200" required></textarea>

       <label>Employee's Comments</label>
 <textarea id="empComments" name="empComments" data-maxchars="200"></textarea>

     <label>Employee Signature</label>
  <canvas id="empSignPad" name="empSignPad"></canvas>
  
  <button type="button" class="secondary" onclick="clearempSignature()">Clear Signature</button>


  <label><br><br>Employee Declaration</label>
   <div class="yesno">
    <label class="radio-box">
      <input type="radio" name="empDeclaration" value="I Accept" required> I Accept
    </label>

    <label class="radio-box">
      <input type="radio" name="empDeclaration" value="I Deny"> I Deny
    </label>

    <label class="radio-box">
      <input type="radio" name="empDeclaration" value="I Refuse to Sign"> I Refuse to Sign
    </label>
    </div>
     </div>
         

      <div class="section">
     <br><h3>Witness Details</h3>

    <label>Name of Witness (if applicable)</label>
  <input id="witnessName" name="witnessName" data-maxchars="60">

   <label>Witness Employee Number</label>
  <input type="number" id="WitnessEmployeeNo" name="WitnessEmployeeNo" data-maxdigits="4">

  <label>Witness Signature</label>
  <canvas id="witnessSignPad" name="witnessSignPad"></canvas>
  
  <button type="button" class="secondary" onclick="clearWitnessSignature()">Clear Signature</button>
   </div>
        
     

      <div class="section">
     <h3>Images</h3>

    <label>📸Upload Images 1</label><input type="file" id="Images1" name="Images1" accept="image/*,application/pdf">
    <label>📸Upload Images 2</label><input type="file" id="Images2" name="Images2" accept="image/*,application/pdf">
  </div>

  
  <div class="section">
     <h3>Reporter Details</h3>

      <label>Reporter Name</label>
  <input type="text" id="SupervisorName" name="SupervisorName" data-maxchars="100" readonly>

   <label>Employee Number</label>
  <input type="number" id="SupEmpNumber" name="SupEmpNumber" data-maxdigits="5" readonly>

     <label>Designation</label>
  <input type="text" id="Supdesignation" name="Supdesignation" readonly>

    <label>Phone</label>
  <input type="text" id="Phone" name="Phone" readonly>
   </div>

 <!-- SIGNATURE -->

  <label>Signature</label>
  <canvas id="supSignPad" name="supSignPad"></canvas>
  
<button type="button" class="secondary" onclick="clearSupSignature()">Clear Signature</button>
   

<button type="submit" id="submitBtn" disabled>Submit</button>
<div id="status"></div>



</form>
<button type="button" onclick="goBack()">
  ⬅ Back to Menu
</button>

<script>
function goBack() {
  window.history.back();
}
</script>


<script src="js/submitoffence.js"></script>
</body>
</html>
